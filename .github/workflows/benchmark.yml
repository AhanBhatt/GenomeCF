name: GenomeCF Fast Checks

on:
  push:
  pull_request:

jobs:
  fast-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run fast tests
        run: |
          python -m pytest -m "not slow and not gpu and not paper"
